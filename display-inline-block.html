<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .bg-main {
        background-color: rgb(63, 63, 2);
      }
      .box {
        width: 200px;
        height: 150px;
      }
      .box1 {
        display: block;
      }
      .box2 {
        display: inline;
      }
      .box3 {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h2 class="my-3 text-danger">boxes with display;block</h2>
    <div class="box box1 bg-main p-3 m-3 text-light">box1</div>
    <div class="box box1 bg-main p-3 m-3 text-light">box2</div>
    <div class="box box1 bg-main p-3 m-3 text-light">box3</div>

    <h2 class="my-3 text-danger">boxes with display;inline</h2>
    <div class="box box2 bg-main p-3 m-3 text-light">box1</div>
    <div class="box box2 bg-main p-3 m-3 text-light">box2</div>
    <div class="box box2 bg-main p-3 m-3 text-light">box3</div>

    <h2 class="my-3 text-danger">boxes with display;inline-block</h2>
    <div class="box box3 bg-main p-3 m-3 text-light">box1</div>
    <div class="box box3 bg-main p-3 m-3 text-light">box2</div>
    <div class="box box3 bg-main p-3 m-3 text-light">box3</div>
  </body>
</html>
