<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list demo</title>
    <style>
           body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: rgb(217, 207, 207);
      }
      h1 {
        color: rgb(205, 126, 8);
        text-align: center;
        text-transform: uppercase;
        } 
      h1:hover {
        color: rgb(14, 143, 130);
        }
        ol, ul {
        color: purple;
        font-size: 18px;
        line-height: 30px;
        }
        .white-box {
        background-color: rgb(255, 255, 255);
        padding: 20px;
        margin: 20px;
        border-radius: 10px;
        }
        h2 {
        color: rgb(14, 143, 130);
        text-decoration: underline;
        text-decoration-color: rgb(205, 126, 8);
        }
        h3 {
        color: rgb(7, 11, 88);
        text-decoration: underline;
        text-decoration-color: rgb(205, 126, 8);
        }
        h3:hover {
        color: rgb(205, 126, 8);
        }   
    </style>
  </head>
  <body>
    <h1>my daily routine</h1>
    <div class="white-box">
        <h2>morning tasks</h2>
        <ol>
            <li>wake up</li>
            <li>brush teeth</li>
            <li>have breakfast</li>
            <li>go to work</li>
            <li>come back home</li>
            <li>have dinner</li>
            <li>go to sleep</li>
        </ol>
    </div>
    <div class="white-box">
        <h3>weekend activities</h3>
        <ul>
            <li>go to the park</li>
            <li>watch a movie</li>
            <li>visit friends</li>
            <li>try a new restaurant</li>
            <li>relax at home</li>
        </ul>
  </body>
</html>
