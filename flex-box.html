<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .contanier {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        flex-wrap: wrap;
        flex-direction: row;
        gap: 20px;
        min-height: 250px;
        border-radius: 6px;
        padding: 10px;
      }
      .box {
        width: 200px;
        min-height: 150px;
        border-radius: 15px;
        padding: 15px;
      }
    </style>
  </head>
  <body>
    <h1 class="text-center p-3 fst-italic">
      <span class="text-warning">F</span>L<span class="text-success">E</span>X
      <span class="text-danger">B</span>OX DE<span class="text-success">M</span>O
    </h1>
    <div class="contanier border border-2 border-dark">
      <div class="box bg-primary">1</div>
      <div class="box bg-danger">2</div>
      <div class="box bg-success">3</div>
      <div class="box bg-warning">4</div>
      <div class="box bg-info">5</div>
      <div class="box bg-dark text-light">6</div>
    </div>
  </body>
</html>
