<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list demo</title>
        <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1 class="text-center text-bg-warning py-3">my daily routine</h1>
    <div class="border">
        <h2 class=" text-bg-info ps-4">morning tasks</h2>
        <ol class="list-group border-1">
            <li class=" list-group-item active ">wake up</li>
            <li class="list-group-item">brush teeth</li>
            <li class="list-group-item ">have breakfast</li>
            <li class="list-group-item">go to work</li>
            <li class="list-group-item">come back home</li>
            <li class="list-group-item">have dinner</li>
            <li class="list-group-item">go to sleep</li>
        </ol>
    </div>
    <div class="border">
        <h3 class="text-center text-bg-danger border rounded-pill p-3">weekend activities</h3>
        <ul class="list-group">
            <li class="list-group-item">go to the park</li>
            <li class="list-group-item">watch a movie</li>
            <li class="list-group-item">visit friends</li>
            <li class="list-group-item">try a new restaurant</li>
            <li class="list-group-item active">relax at home</li>
        </ul>
  </body>
</html>
