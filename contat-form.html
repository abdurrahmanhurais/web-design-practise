<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contact us form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      form {
        width: 600px;
      }
    </style>
  </head>
  <body>
    <h2 class="text-center text-warning py-3">contact us form</h2>
    <form
      action="https://formspree.io/f/mnjylpab"
      method="post"
      class="shadow p-4 rounded-3 mx-auto"
    >
      <div class="my-3">
        <label for="nametextbox" class="form-label fw-bold">Name:</label>
        <input
          type="text"
          name="nametextbox"
          id="nametextbox"
          class="form-control"
          placeholder="enter your full name"
        />
      </div>
      <div class="my-3">
        <label for="emailtextbox" class="form-label fw-bold">Email:</label>
        <input
          type="email"
          name="emailtextbox"
          id="emailtextbox"
          class="form-control"
          placeholder="enter your email"
        />
      </div>
      <div class="my-3">
        <label for="subjecttextbox" class="form-label fw-bold">Subject:</label>
        <input
          type="subjet"
          name="subjecttextbox"
          id="subjectextbox"
          class="form-control"
          placeholder="enter subject"
        />
      </div>
      <div class="my-3">
        <label for="messagetextbox" class="form-label fw-bold">Message:</label>
        <textarea
          name="messagetextbox"
          id="messagetextbox"
          class="form-control"
          rows="3"
        ></textarea>
      </div>
      <div class="my-3">
        <input
          type="submit"
          value="Send Message"
          class="btn btn-primary btn-lg w-100"
        />
      </div>
    </form>
  </body>
</html>
